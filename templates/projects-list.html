<div class="project-grid">
$for(projects)$
  <div class="project-card" id="$id$">
    $if(image)$
    <a href="$link$" target="_blank" rel="noopener">
      <img class="project-image" src="$image$" alt="$image_alt$">
    </a>
    $endif$
    <div class="project-title-row">
      <a href="$link$" target="_blank" rel="noopener"><h2>$title$</h2></a>
      $if(year)$<span class="project-year">$year$</span>$endif$
    </div>
    <p>$description$</p>
  </div>
$endfor$
</div>
